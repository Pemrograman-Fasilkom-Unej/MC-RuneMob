    bar_color: BLUE
    wave_interval: 10
    duration_minutes: 10
    scale_with_players: true
    waves:
      1:
        - type: ELDER_GUARDIAN
          rarity: legendary
          amount: 1
          name: "&bThe Deep Sea Leviathan"
          is_boss: true
          ai: "leviathan"
      2:
        - type: DROWNED
          rarity: epic
          amount: 4
          name: "&bLost Sailor"
      3:
        - type: DROWNED
          rarity: epic
          amount: 4
