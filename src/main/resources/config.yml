# RuneMobs Configuration
config-version: "20260306-prod"
rune_duration_minutes: 60 # Duration in minutes before an engraved rune decays

auto_raid:
  enabled: false
  interval_minutes: 60
  raid_id: "eikthyr"

# Boss-specific rewards for all raid participants (within 50 blocks)
# Each boss drops a specific rune + emerald blocks to every participant
# Eikthyr has no special rewards (army raid)
boss_rewards:
  reward_radius: 50  # blocks from boss death location
  emerald_blocks: 3  # emerald blocks given per participant
  rune_mapping:
    forgotten_king: "ASCENDED_RETRIBUTION"
    corrupted_guardian: "ASCENDED_SOLAR_BLESSING"
    leviathan: "ASCENDED_STORMCALLER"
    plague_doctor: "ASCENDED_VENOM"
    nether_warlord: "ASCENDED_PHOENIX_CORE"
    miner_titan: "ASCENDED_FURNACE"
    moonlight_stalker: "ASCENDED_BERSERK"
    soul_collector: "ASCENDED_VAMPIRISM"

rarities:
  rare:
    chance: 0.15 # 15% chance for a spawned mob to be Rare
    name_format: "&9[Rare] &f{mob}"
    health_multiplier: 1.5
    damage_multiplier: 1.25
    emerald_drop:
      min: 1
      max: 4
  epic:
    chance: 0.05 # 5% chance
    name_format: "&5[Epic] &f{mob}"
    health_multiplier: 2.5
    damage_multiplier: 1.5
    emerald_drop:
      min: 4
      max: 8
    rune_drop_chance: 0.25 # 25% chance for epic to drop a Rune
  legendary:
    chance: 0.01 # 1% chance
    name_format: "&6[Legendary] &f{mob}"
    health_multiplier: 5.0
    damage_multiplier: 2.0
    emerald_drop:
      min: 8
      max: 16
    rune_drop_chance: 1.0 # 100% chance for legendary to drop a Rune
    raid_scroll_drop_chance: 0.4 # 40% chance to drop an Eikthyr summoning scroll

ender_dragon:
  enabled: true
  health_per_player_multiplier: 0.5 # Adds +50% of base health per extra player
  damage_per_player_multiplier: 0.25 # Adds +25% of base damage per extra player
  crystal_respawn_seconds: 60
  fireball_explosion_power: 3.0
  aggro_enderman_interval_ticks: 300 # 15 seconds
  crystal_break_debuff_duration_ticks: 100 # 5 seconds

auto_raid:
  enabled: false
  interval_minutes: 60
  raid_id: "eikthyr"

raids:
  eikthyr:
    title: "&cArmy of Eikthyr Raid"
    bar_color: RED
    wave_interval: 45 # seconds between waves
    duration_minutes: 5 # Time before raid despawns
    scale_with_players: true # Multiply spawned mobs by online players
    waves:
      1:
        - type: WOLF
          rarity: rare
          amount: 2
          name: "&4Angry Wolf"
        - type: PIGLIN
          rarity: rare
          amount: 2
          name: "&4Orc"
          equipment:
            helmet: LEATHER_HELMET:BLACK
            chestplate: LEATHER_CHESTPLATE:BLACK
            main_hand: CROSSBOW
      2:
        - type: WOLF
          rarity: rare
          amount: 2
          name: "&4Angry Wolf"
        - type: PIGLIN
          rarity: rare
          amount: 2
          name: "&4Orc"
      3:
        - type: PIGLIN
          rarity: epic
          amount: 2
          name: "&4Orc"
        - type: WOLF
          rarity: epic
          amount: 2
          name: "&4Angry Wolf"
      4:
        - type: PIGLIN
          rarity: epic
          amount: 2
          name: "&4Orc Rider"
          baby: true
          mount: WOLF
          equipment:
            helmet: NETHERITE_HELMET
            main_hand: STONE_AXE
        - type: PIGLIN
          rarity: epic
          amount: 2
          name: "&4Orc"
          equipment:
            helmet: LEATHER_HELMET:BLACK
            chestplate: LEATHER_CHESTPLATE:BLACK
            main_hand: STONE_SWORD
      5:
        - type: PIGLIN_BRUTE
          rarity: rare
          amount: 1
          name: "&6Orc Chieftain"
          is_boss: true
          equipment:
            helmet: NETHERITE_HELMET
            chestplate: NETHERITE_CHESTPLATE
            main_hand: STONE_AXE

  forgotten_king:
    title: "&4The Forgotten King Raid"
    bar_color: PURPLE
    wave_interval: 10
    duration_minutes: 10
    scale_with_players: false
    waves:
      1:
        - type: WITHER_SKELETON
          rarity: legendary
          amount: 1
          name: "&4The Forgotten King"
          is_boss: true
          ai: "forgotten_king"
          equipment:
            helmet: GOLDEN_HELMET
            chestplate: GOLDEN_CHESTPLATE
            main_hand: IRON_SWORD

  corrupted_guardian:
    title: "&2The Corrupted Forest Raid"
    bar_color: GREEN
