    duration_minutes: 10
    scale_with_players: false
    waves:
      1:
        - type: SKELETON
          rarity: legendary
          amount: 1
          name: "&cThe Nether Warlord"
          is_boss: true
          ai: "nether_warlord"
          equipment:
            helmet: CHAINMAIL_HELMET
            chestplate: CHAINMAIL_CHESTPLATE
            main_hand: NETHERITE_SWORD

  miner_titan:
